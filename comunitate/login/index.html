<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Autentificare — Atelierul-LRO</title>
  <meta name="description" content="Conectează-te la Atelierul-LRO: comunitatea de învățare a limbii și literaturii române." />
  <link rel="stylesheet" href="../../src/shared/styles/main.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <section class="page-hero">
      <h1>Autentificare</h1>
      <p>Conectează-te pentru a participa în comunitate: postezi, comentezi, câștigi puncte și streak.</p>
      <button id="google-signin" class="btn btn--primary">Continuă cu Google</button>
      <p id="login-note" class="login-note">Conectează-te cu contul tău Google.</p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module">
    import { renderChrome } from "../../src/shared/components/site-chrome.js";
    import { supabase } from "../../src/shared/scripts/supabase-client.js";
    import { signInWithGoogle, signOut } from "../../src/shared/scripts/auth.js";
    renderChrome("../../");

    const btn = document.getElementById("google-signin");
    const note = document.getElementById("login-note");

    // Reflect the REAL Supabase session. Shows the signed-in user after
    // returning from Google, and offers sign-out. (Wiring the rest of the
    // site to this real session is the next step.)
    function render(user) {
      if (user) {
        const name =
          user.user_metadata?.full_name ||
          user.user_metadata?.name ||
          user.email;
        note.textContent = "Ești conectat ca " + name + " ✔";
        btn.textContent = "Deconectează-te";
        btn.onclick = async () => {
          await signOut();
          location.reload();
        };
      } else {
        note.textContent = "Conectează-te cu contul tău Google.";
        btn.textContent = "Continuă cu Google";
        btn.onclick = () => signInWithGoogle();
      }
    }

    // Fires on login/logout AND right after Google sends the user back.
    supabase.auth.onAuthStateChange((_event, session) =>
      render(session?.user ?? null)
    );

    const {
      data: { session },
    } = await supabase.auth.getSession();
    render(session?.user ?? null);
  </script>
</body>
</html>
